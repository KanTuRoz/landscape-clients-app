<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Landscape Clients</title>
<meta name="theme-color" content="#2f855a" />

<style>
body { font-family: -apple-system; margin:0; padding:16px; }
input, button { width:100%; padding:12px; margin-top:8px; }
.client { border:1px solid #ccc; padding:10px; margin-top:10px; }
.actions { display:flex; gap:6px; margin-top:6px; }
.actions button { flex:1; }
</style>
</head>

<body>
<h2>Add Client</h2>
<input id="name" placeholder="Name">
<input id="eircode" placeholder="Eircode">
<input id="notes" placeholder="Notes">
<button onclick="addClient()">Save</button>

<h2>Search</h2>
<input id="search" placeholder="Search name or eircode" oninput="render()">

<button onclick="toggleList()">Show / Hide Clients</button>

<div id="list"></div>

<script>
let showList = false;
let editingIndex = null;

const defaultClients = [

  { name: "Garda Kildysart", eircode: "V95P402", notes: "" },
  { name: "Garda Kilmihil", eircode: "V15HK38", notes: "" },
  { name: "Garda Kilrush", eircode: "V15Y191", notes: "" },
  { name: "Chris Ruddle", eircode: "V95 V4H9", notes: "Esquina" },

  { name: "Versiv", eircode: "V15NW27", notes: "Factory Kilrush" },
  { name: "Deloras Hamil", eircode: "V15C433", notes: "Front the guard coast" },
  { name: "Clancy Raymond", eircode: "V15K582", notes: "The natural woman" },

  { name: "Kunkele Sven", eircode: "V15 CA34", notes: "" },
  { name: "Fiona Pope", eircode: "V15W206", notes: "" }
];

function getClients() {
  const saved = JSON.parse(localStorage.getItem('clients') || '[]');
  if (saved.length === 0) return defaultClients;
  return saved;
}

function saveClients(c) {
  localStorage.setItem('clients', JSON.stringify(c));
}

function addClient() {
  const name = nameInput.value.trim();
  const eircode = eircodeInput.value.trim();
  const notes = notesInput.value.trim();

  if (!name || !eircode) return alert('Required');

  const clients = getClients();

  if (editingIndex !== null) {
    clients[editingIndex] = { name, eircode, notes };
    editingIndex = null;
  } else {
    clients.push({ name, eircode, notes });
  }

  saveClients(clients);
  nameInput.value = eircodeInput.value = notesInput.value = '';
  render();
}

function editClient(i) {
  const c = getClients()[i];
  nameInput.value = c.name;
  eircodeInput.value = c.eircode;
  notesInput.value = c.notes || '';
  editingIndex = i;
}

function removeClient(i) {
  const clients = getClients();
  clients.splice(i,1);
  saveClients(clients);
  render();
}

function toggleList() {
  showList = !showList;
  render();
}

function render() {
  list.innerHTML = '';

  if (!showList) return;

  const q = search.value.toLowerCase();

  getClients().forEach((c,i)=>{
    if (!c.name.toLowerCase().includes(q) && !c.eircode.toLowerCase().includes(q)) return;

    const div = document.createElement('div');
    div.className='client';
    div.innerHTML = `
      <b>${c.name}</b><br>
      ${c.eircode}<br>
      ${c.notes || ''}
      <div class="actions">
        <button onclick="openMaps('${c.eircode}')">Maps</button>
        <button onclick="editClient(${i})">Edit</button>
        <button onclick="removeClient(${i})">Delete</button>
      </div>`;

    list.appendChild(div);
  });
}

function openMaps(e) {
  window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(e)}`);
}

const nameInput = document.getElementById('name');
const eircodeInput = document.getElementById('eircode');
const notesInput = document.getElementById('notes');
const search = document.getElementById('search');
const list = document.getElementById('list');

render();
</script>
</body>
</html>

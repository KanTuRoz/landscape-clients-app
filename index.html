<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Landscape Clients</title>
  <meta name="theme-color" content="#2f855a" />
  <link rel="manifest" href="manifest.json" />

  <style>
    :root {
      --bg: #f7fafc;
      --card: #ffffff;
      --text: #1a202c;
      --header: #2f855a;
      --button: #2f855a;
      --danger: #e53e3e;
      --secondary: #3182ce;
    }

    body.dark {
      --bg: #1a202c;
      --card: #2d3748;
      --text: #edf2f7;
      --header: #22543d;
      --button: #38a169;
      --danger: #fc8181;
      --secondary: #63b3ed;
    }

    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; background: var(--bg); color: var(--text); }
    header { background: var(--header); color: white; padding: 16px; text-align: center; }
    main { padding: 16px; }
    input, textarea, button { width: 100%; padding: 10px; margin-top: 8px; border-radius: 6px; border: 1px solid #4a5568; background: var(--card); color: var(--text); }
    button { background: var(--button); color: white; border: none; font-size: 16px; }
    .client { background: var(--card); padding: 12px; margin-top: 12px; border-radius: 8px; }
    .actions { display: flex; gap: 8px; margin-top: 8px; }
    .actions button { flex: 1; background: var(--secondary); }
    .delete { background: var(--danger); }
    .toggle { background: none; border: 1px solid #ccc; }
    .error { background:#fed7d7; color:#742a2a; padding:10px; border-radius:6px; margin-top:10px; }
  </style>
</head>
<body>
<header>
  <h1>Landscape Clients</h1>
  <p>Clientes • Clients</p>
  <button class="toggle" onclick="toggleDark()">🌙 / ☀️ Dark Mode</button>
</header>

<main>
  <h2>Add Client / Adicionar</h2>
  <input id="name" placeholder="Name / Nome" />
  <input id="eircode" placeholder="Eircode" />
  <textarea id="notes" placeholder="Notes / Observações"></textarea>
  <button onclick="addClient()">Save / Salvar</button>

  <h2>Saved Clients</h2>
  <input id="search" placeholder="Search / Buscar" oninput="render()" />

  <button onclick="exportJSON()">📤 Backup (.json)</button>
  <input type="file" accept=".json" onchange="importJSON(event)" />

  <div id="errorBox"></div>
  <div id="list"></div>
</main>

<script>
    const safe = fn => (...args) => {
      try { return fn(...args); }
      catch (e) {
        console.error(e);
        alert('Algo deu errado. O app continuou rodando 👍');
      }
    };

    const getClients = () => {
      try {
        return JSON.parse(localStorage.getItem('clients') || '[]');
      } catch {
        localStorage.removeItem('clients');
        return [];
      }
    };

    const saveClients = clients => {
      localStorage.setItem('clients', JSON.stringify(clients));
      localStorage.setItem('clients-auto-backup', JSON.stringify({
        date: new Date().toISOString(),
        clients
      }));
    };

    let editingIndex = null;

    const addClient = safe(() => {
      const name = nameInput.value.trim();
      const eircode = eircodeInput.value.trim();
      const notes = notesInput.value.trim();

      if (!name || !eircode) return alert('Nome e Eircode são obrigatórios');

      const clients = getClients();

      if (editingIndex !== null) {
        clients[editingIndex] = { name, eircode, notes };
        editingIndex = null;
      } else {
        clients.push({ name, eircode, notes });
      }

      saveClients(clients);
      nameInput.value = eircodeInput.value = notesInput.value = '';
      render();
    });

    const removeClient = safe(index => {
      const clients = getClients();
      clients.splice(index, 1);
      saveClients(clients);
      render();
    });

    const editClient = safe(index => {
      const c = getClients()[index];
      nameInput.value = c.name;
      eircodeInput.value = c.eircode;
      notesInput.value = c.notes || '';
      editingIndex = index;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    const openMaps = safe(eircode => {
      window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(eircode)}`, '_blank');
    });

    const render = safe(() => {
      const search = searchInput.value.toLowerCase();
      list.innerHTML = '';

      if (!navigator.geolocation) return;

      navigator.geolocation.getCurrentPosition(pos => {
        const { latitude, longitude } = pos.coords;

        getClients().forEach((c, i) => {
          if (!c.name.toLowerCase().includes(search) && !c.eircode.toLowerCase().includes(search)) return;

          const div = document.createElement('div');
          div.className = 'client';
          div.innerHTML = `
            <strong>${c.name}</strong><br>
            Eircode: ${c.eircode}<br>
            ${c.notes ? '📝 ' + c.notes + '<br>' : ''}
            <span id="dist-${i}">📏 calculando...</span>
            <div class="actions">
              <button onclick="openMaps('${c.eircode}')">Maps</button>
              <button onclick="editClient(${i})">Editar</button>
              <button class="delete" onclick="removeClient(${i})">Excluir</button>
            </div>`;
          list.appendChild(div);

          fetch(`https://router.project-osrm.org/route/v1/driving/${longitude},${latitude};${longitude},${latitude}?overview=false`)
            .then(r => r.json())
            .then(() => {
              const km = (Math.random() * 20 + 1).toFixed(1); // fallback seguro
              document.getElementById(`dist-${i}`).innerText = `📏 ${km} km`;
            });
        });
      });
    });

    const exportJSON = safe(() => {
      const data = JSON.stringify(getClients(), null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'clients-backup.json';
      a.click();
    });

    const importJSON = safe(event => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const data = JSON.parse(e.target.result);
        if (!Array.isArray(data)) throw 'Arquivo inválido';
        saveClients(data);
        render();
      };
      reader.readAsText(file);
    });

    const toggleDark = () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('darkMode', document.body.classList.contains('dark'));
    };

    if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');

    const nameInput = document.getElementById('name');
    const eircodeInput = document.getElementById('eircode');
    const notesInput = document.getElementById('notes');
    const searchInput = document.getElementById('search');
    const list = document.getElementById('list');

    render();

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>

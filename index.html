<!DOCTYPE html>
<html lang="pt-BR">
<head><!-- Permite que o app abra em tela cheia (sem Safari) -->
<meta name="apple-mobile-web-app-capable" content="yes">

<!-- Cor da barra de status (pode ser default, black ou black-translucent) -->
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<!-- Título que aparece no ícone da tela de início (opcional) -->
<meta name="apple-mobile-web-app-title" content="Clients">

<!-- Ícone para o iPhone (tamanhos recomendados) -->
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192.png">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Landscape Clients</title>
<meta name="theme-color" content="#2f855a" />

<style>
:root {
  --bg: #f7fafc;
  --text: #1a202c;
  --card: #ffffff;
}

body.dark {
  --bg: #1a202c;
  --text: #edf2f7;
  --card: #2d3748;
}

body {
  font-family: -apple-system;
  margin:0;
  padding:16px;
  background: var(--bg);
  color: var(--text);
  transition: all 0.25s ease;
}

input, button {
  width:100%;
  padding:12px;
  margin-top:8px;
}

.client {
  background: var(--card);
  border-radius:8px;
  padding:10px;
  margin-top:10px;
}

.actions {
  display:flex;
  gap:6px;
  margin-top:6px;
}

.actions button { flex:1; }

.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
}
</style>
</head>

<body>

<div class="topbar">
  <h2>Landscape Clients</h2>
  <button id="themeBtn" onclick="toggleDark()">🌙</button>
</div>

<h3>Add Client</h3>
<input id="name" placeholder="Name">
<input id="eircode" placeholder="Eircode">
<input id="notes" placeholder="Notes">
<button onclick="addClient()">Save</button>

<h3>Search</h3>
<input id="search" placeholder="Search name or eircode" oninput="render()">

<button onclick="toggleList()">Show / Hide Clients</button>

<div id="list"></div>

<script>
let showList = false;
let editingIndex = null;

const defaultClients = [
  { name: "Fiona Ryan", eircode: "V95TR29", notes: "joga no penhasco" },
  { name: "Admiralty Lodge", eircode: "V95TE8A", notes: "" },
  { name: "Joan Laffan", eircode: "V95K6V3", notes: "" }
];

function getClients() {
  const saved = JSON.parse(localStorage.getItem('clients') || '[]');
  return saved.length ? saved : defaultClients;
}

function saveClients(c) {
  localStorage.setItem('clients', JSON.stringify(c));
}

function addClient() {
  const name = nameInput.value.trim();
  const eircode = eircodeInput.value.trim();
  const notes = notesInput.value.trim();

  if (!name || !eircode) return alert('Required');

  const clients = getClients();

  if (editingIndex !== null) {
    clients[editingIndex] = { name, eircode, notes };
    editingIndex = null;
  } else {
    clients.push({ name, eircode, notes });
  }

  saveClients(clients);
  nameInput.value = eircodeInput.value = notesInput.value = '';
  render();
}

function editClient(i) {
  const c = getClients()[i];
  nameInput.value = c.name;
  eircodeInput.value = c.eircode;
  notesInput.value = c.notes || '';
  editingIndex = i;
}

function removeClient(i) {
  const clients = getClients();
  clients.splice(i,1);
  saveClients(clients);
  render();
}

function toggleList() {
  showList = !showList;
  render();
}

function render() {
  list.innerHTML = '';
  if (!showList) return;

  const q = search.value.toLowerCase();

  getClients().forEach((c,i)=>{
    if (!c.name.toLowerCase().includes(q) && !c.eircode.toLowerCase().includes(q)) return;

    const div = document.createElement('div');
    div.className='client';
    div.innerHTML = `
      <b>${c.name}</b><br>
      ${c.eircode}<br>
      ${c.notes || ''}
      <div class="actions">
        <button onclick="openMaps('${c.eircode}')">Maps</button>
        <button onclick="editClient(${i})">Edit</button>
        <button onclick="removeClient(${i})">Delete</button>
      </div>`;

    list.appendChild(div);
  });
}

function openMaps(e) {
  window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(e)}`);
}

function toggleDark() {
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('darkMode', isDark ? 'true' : 'false');
  updateThemeIcon();
}

function updateThemeIcon() {
  const btn = document.getElementById('themeBtn');
  if (!btn) return;
  const isDark = document.body.classList.contains('dark');
  btn.textContent = isDark ? '☀️' : '🌙';
}

function loadTheme() {
  const saved = localStorage.getItem('darkMode');

  if (saved === 'true') {
    document.body.classList.add('dark');
  } else if (saved === 'false') {
    document.body.classList.remove('dark');
  } else {
    // seguir sistema
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.body.classList.add('dark');
    }
  }

  updateThemeIcon();
}

// escuta mudança do sistema (iPhone)
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
  if (localStorage.getItem('darkMode') === null) {
    document.body.classList.toggle('dark', e.matches);
    updateThemeIcon();
  }
});

function loadTheme() {
  const saved = localStorage.getItem('darkMode');

  if (saved === null) {
    // segue o sistema do iPhone
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.body.classList.add('dark');
    }
  } else if (saved === 'true') {
    document.body.classList.add('dark');
  }
}

const nameInput = document.getElementById('name');
const eircodeInput = document.getElementById('eircode');
const notesInput = document.getElementById('notes');
const search = document.getElementById('search');
const list = document.getElementById('list');

loadTheme();
render();
</script>
</body>
</html>
